version: '3.8'

services:

  web:
    build: .
    container_name: web_php
    ports:
      - "8080:80"

    volumes:
      - ./web:/var/www/html

    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql_db

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tienda

    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:

